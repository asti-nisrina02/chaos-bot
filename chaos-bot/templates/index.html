<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CHAOS Bot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: var(--bg, #0f0f0f);
      color: #f0f0f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: background 0.6s ease;
    }

    body.chaos { --bg:#0f0f0f; --bg2:#1a0a0a; --bg3:#1e1e2e; --accent:#ff4d4d; --accent-dim:#ff4d4d44; --border:#333; --eye-bg:#1a0000; }
    body.chill { --bg:#0a0f1a; --bg2:#0a1020; --bg3:#0f1a2e; --accent:#4d9fff; --accent-dim:#4d9fff44; --border:#1a2a3a; --eye-bg:#00111a; }
    body.study { --bg:#0a110a; --bg2:#0a1a0a; --bg3:#0f1e0f; --accent:#4dff88; --accent-dim:#4dff8844; --border:#1a3a1a; --eye-bg:#001a00; }

    header { width:100%; max-width:720px; padding:20px 24px 8px; text-align:center; }

    #eye-display {
      width:120px; height:60px;
      background: var(--eye-bg);
      border-radius:12px;
      margin:0 auto 12px;
      display:flex; align-items:center; justify-content:center; gap:16px;
      border:1px solid var(--accent-dim);
      transition: background 0.6s, border-color 0.6s;
    }

    .eye {
      width:28px; height:28px;
      border-radius:50%;
      background: var(--accent);
      box-shadow: 0 0 10px var(--accent);
      transition: all 0.4s ease;
      position:relative;
    }
    .eye::after { content:''; position:absolute; width:8px; height:8px; background:rgba(255,255,255,0.3); border-radius:50%; top:4px; left:4px; }

    body.chill .eye { border-radius:4px; height:18px; }
    body.study .eye { border-radius:2px; height:14px; width:22px; }

    @keyframes blink-chaos { 0%,90%,100%{transform:scaleY(1)} 95%{transform:scaleY(0.05)} }
    @keyframes blink-chill { 0%,92%,100%{transform:scaleY(1)} 96%{transform:scaleY(0.05)} }
    @keyframes blink-study { 0%,85%,88%,100%{transform:scaleY(1)} 86%{transform:scaleY(0.05)} }

    body.chaos .eye { animation: blink-chaos 2.5s infinite; }
    body.chaos .eye:nth-child(2) { animation-delay:0.1s; }
    body.chill .eye { animation: blink-chill 5s infinite; }
    body.chill .eye:nth-child(2) { animation-delay:0.12s; }
    body.study .eye { animation: blink-study 4s infinite; }
    body.study .eye:nth-child(2) { animation-delay:0.08s; }

    header h1 { font-size:2rem; font-weight:700; color:var(--accent); letter-spacing:6px; transition:color 0.6s; }
    header p { font-size:0.8rem; color:#777; margin-top:4px; min-height:18px; }

    /* 3-way mode selector */
    #mode-selector {
      display:flex; align-items:center; justify-content:center;
      gap:0; margin:12px 0 4px;
      background:#1a1a1a;
      border-radius:12px;
      padding:4px;
      width:fit-content;
      margin-left:auto; margin-right:auto;
    }

    .mode-btn {
      padding:6px 18px;
      border-radius:8px;
      border:none;
      background:transparent;
      font-size:0.75rem;
      font-weight:700;
      letter-spacing:2px;
      cursor:pointer;
      transition: background 0.3s, color 0.3s, opacity 0.3s;
      color:#555;
      opacity:0.6;
    }

    .mode-btn:hover { opacity:0.85; }

    .mode-btn.chaos-btn.active { background:#ff4d4d22; color:#ff4d4d; opacity:1; }
    .mode-btn.chill-btn.active { background:#4d9fff22; color:#4d9fff; opacity:1; }
    .mode-btn.study-btn.active { background:#4dff8822; color:#4dff88; opacity:1; }

    #chat-window {
      flex:1; width:100%; max-width:720px;
      overflow-y:auto; padding:16px 24px;
      display:flex; flex-direction:column; gap:12px;
    }

    .message { max-width:80%; padding:12px 16px; border-radius:16px; font-size:0.95rem; line-height:1.6; white-space:pre-wrap; }
    .message.user { background:var(--bg3); border:1px solid var(--border); align-self:flex-end; border-bottom-right-radius:4px; transition:background 0.6s, border-color 0.6s; }
    .message.bot { background:var(--bg2); border:1px solid var(--accent-dim); align-self:flex-start; border-bottom-left-radius:4px; transition:background 0.6s, border-color 0.6s; max-width:88%; }
    .message.bot .name { font-size:0.7rem; color:var(--accent); font-weight:700; letter-spacing:2px; margin-bottom:4px; transition:color 0.6s; }
    .message.error { background:#1a0a0a; border:1px solid #ff4d4d; color:#ff6b6b; align-self:center; text-align:center; font-size:0.85rem; }
    .message.user img { max-width:200px; border-radius:8px; display:block; margin-bottom:6px; }

    .typing { align-self:flex-start; padding:12px 16px; background:var(--bg2); border:1px solid var(--accent-dim); border-radius:16px; border-bottom-left-radius:4px; color:var(--accent); font-size:0.85rem; animation:pulse 1.2s infinite; transition:all 0.6s; }
    @keyframes pulse { 0%,100%{opacity:0.5} 50%{opacity:1} }

    .mode-badge { display:inline-block; font-size:0.6rem; padding:2px 6px; border-radius:4px; background:var(--accent-dim); color:var(--accent); letter-spacing:1px; margin-left:6px; vertical-align:middle; transition:all 0.6s; }

    #input-area { width:100%; max-width:720px; padding:8px 24px 24px; display:flex; flex-direction:column; gap:8px; }
    #input-row { display:flex; gap:10px; }

    #user-input { flex:1; background:#1e1e1e; border:1px solid var(--border); border-radius:12px; padding:12px 16px; color:#f0f0f0; font-size:0.95rem; outline:none; resize:none; height:48px; transition:border-color 0.3s; }
    #user-input:focus { border-color:var(--accent); }

    button { background:var(--accent); color:white; border:none; border-radius:12px; padding:0 20px; font-size:0.9rem; font-weight:600; cursor:pointer; transition:background 0.4s, opacity 0.2s; }
    button:hover { opacity:0.85; }
    button:disabled { opacity:0.4; cursor:not-allowed; }

    #reset-btn { background:transparent; border:1px solid var(--border); color:#666; padding:0 14px; font-size:0.8rem; }
    #reset-btn:hover { border-color:var(--accent); color:var(--accent); background:transparent; opacity:1; }

    #camera-row { display:flex; align-items:center; gap:10px; }
    #camera-btn { background:transparent; border:1px dashed var(--accent-dim); color:var(--accent); border-radius:10px; padding:6px 14px; font-size:0.8rem; cursor:pointer; display:flex; align-items:center; gap:6px; transition:all 0.3s; }
    #camera-btn:hover { border-color:var(--accent); background:var(--accent-dim); opacity:1; }

    #image-preview { display:none; align-items:center; gap:8px; font-size:0.8rem; color:#888; }
    #image-preview img { width:36px; height:36px; object-fit:cover; border-radius:6px; border:1px solid var(--accent-dim); }
    #clear-img { background:none; border:none; color:#666; font-size:1rem; cursor:pointer; padding:0 4px; }
    #clear-img:hover { color:#ff4d4d; opacity:1; }
    #file-input { display:none; }
  </style>
</head>
<body id="body" class="chaos">
  <header>
    <div id="eye-display"><div class="eye"></div><div class="eye"></div></div>
    <h1 id="bot-name">C H A O S</h1>

    <div id="mode-selector">
      <button class="mode-btn chaos-btn active" onclick="switchMode('chaos')">😈 CHAOS</button>
      <button class="mode-btn chill-btn" onclick="switchMode('chill')">😌 CHILL</button>
      <button class="mode-btn study-btn" onclick="switchMode('study')">🧠 STUDY</button>
    </div>

    <p id="subtitle">An AI of questionable stability. Helpful anyway.</p>
  </header>

  <div id="chat-window">
    <div class="message bot">
      <div class="name">CHAOS <span class="mode-badge">CHAOS MODE</span></div>
      Greetings, human! I am CHAOS, your MAGNIFICENTLY unhinged assistant. I was just thinking about last Tuesday — anyway, ask me ANYTHING. Or show me something. I will react to it. Chaotically.
    </div>
  </div>

  <div id="input-area">
    <div id="camera-row">
      <button id="camera-btn" onclick="document.getElementById('file-input').click()">📷 show me something</button>
      <div id="image-preview">
        <img id="preview-thumb" src="" alt="preview"/>
        <span id="preview-name"></span>
        <button id="clear-img" onclick="clearImage()">✕</button>
      </div>
      <input type="file" id="file-input" accept="image/*" onchange="handleImageSelect(this)"/>
    </div>
    <div id="input-row">
      <textarea id="user-input" placeholder="Ask something..." rows="1"></textarea>
      <button id="reset-btn" onclick="resetChat()">Reset</button>
      <button id="send-btn" onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script>
    let currentMode = 'chaos';
    let selectedImageBase64 = null;

    const body = document.getElementById('body');
    const botName = document.getElementById('bot-name');
    const subtitle = document.getElementById('subtitle');
    const chatWindow = document.getElementById('chat-window');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');

    const modeConfig = {
      chaos: {
        name: 'C H A O S',
        subtitle: 'An AI of questionable stability. Helpful anyway.',
        typing: 'CHAOS is spiraling... please hold...',
        intro: "CHAOS MODE ACTIVATED. Buckle up. Last Tuesday was a WARNING and nobody listened.",
      },
      chill: {
        name: 'C H I L L',
        subtitle: 'An AI of surprising composure.',
        typing: 'thinking...',
        intro: "...switching to CHILL mode. Conversation reset. How can I help you?",
      },
      study: {
        name: 'S T U D Y',
        subtitle: 'An AI that actually wants to teach you things.',
        typing: 'looking this up...',
        intro: "STUDY mode activated! 📚 What are we learning today? Ask me anything — no judgment, only knowledge.",
      }
    };

    userInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });

    function switchMode(mode) {
      if (mode === currentMode) return;
      currentMode = mode;
      const cfg = modeConfig[mode];

      body.className = mode;
      botName.textContent = cfg.name;
      subtitle.textContent = cfg.subtitle;

      document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
      document.querySelector(`.${mode}-btn`).classList.add('active');

      fetch('/mode', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({mode}) });
      addMessage('bot', cfg.intro);
    }

    function handleImageSelect(input) {
      const file = input.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        selectedImageBase64 = e.target.result.split(',')[1];
        document.getElementById('preview-thumb').src = e.target.result;
        document.getElementById('preview-name').textContent = file.name.length > 20 ? file.name.slice(0,20)+'...' : file.name;
        document.getElementById('image-preview').style.display = 'flex';
      };
      reader.readAsDataURL(file);
    }

    function clearImage() {
      selectedImageBase64 = null;
      document.getElementById('file-input').value = '';
      document.getElementById('image-preview').style.display = 'none';
      document.getElementById('preview-thumb').src = '';
    }

    function addMessage(role, text, imgSrc=null) {
      const div = document.createElement('div');
      div.className = `message ${role}`;
      if (role === 'bot') {
        const label = currentMode.toUpperCase();
        div.innerHTML = `<div class="name">${label} <span class="mode-badge">${label} MODE</span></div>${escapeHtml(text)}`;
      } else if (role === 'user') {
        if (imgSrc) div.innerHTML = `<img src="${imgSrc}" alt="uploaded"/>${escapeHtml(text || 'what do you see?')}`;
        else div.textContent = text;
      } else {
        div.textContent = '⚠ ' + text;
      }
      chatWindow.appendChild(div);
      chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    function escapeHtml(t) {
      return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    async function sendMessage() {
      const msg = userInput.value.trim();
      if (!msg && !selectedImageBase64) return;

      const imgSrc = selectedImageBase64 ? document.getElementById('preview-thumb').src : null;
      userInput.value = '';
      sendBtn.disabled = true;
      addMessage('user', msg || 'what do you see?', imgSrc);

      const typing = document.createElement('div');
      typing.className = 'typing';
      typing.textContent = modeConfig[currentMode].typing;
      chatWindow.appendChild(typing);
      chatWindow.scrollTop = chatWindow.scrollHeight;

      const payload = { message: msg || 'What do you think of this image?', mode: currentMode };
      if (selectedImageBase64) payload.image = selectedImageBase64;

      try {
        const res = await fetch('/chat', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) });
        const data = await res.json();
        typing.remove();
        if (data.error) addMessage('error', data.error);
        else addMessage('bot', data.reply);
      } catch(err) {
        typing.remove();
        addMessage('error', 'Could not reach the server. Is Flask running?');
      }

      clearImage();
      sendBtn.disabled = false;
      userInput.focus();
    }

    async function resetChat() {
      await fetch('/reset', { method:'POST' });
      chatWindow.innerHTML = '';
      const msgs = { chaos:"Memory wiped! CHAOS has been reborn. What were we talking about? Actually, it doesn't matter.", chill:'Conversation cleared. Ready when you are.', study:'Session reset! 📚 What shall we study?' };
      addMessage('bot', msgs[currentMode]);
    }
  </script>
</body>
</html>
