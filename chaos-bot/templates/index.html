<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CHAOS Bot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #ff4d4d;
      --accent-dim: #ff4d4d44;
      --accent-text: #ff4d4d;
      --bg: #0f0f0f;
      --bg2: #1a0a0a;
      --bg3: #1e1e2e;
      --border: #333;
    }

    body.chill {
      --accent: #4d9fff;
      --accent-dim: #4d9fff44;
      --accent-text: #4d9fff;
      --bg: #0a0f1a;
      --bg2: #0a1020;
      --bg3: #0f1a2e;
      --border: #1a2a3a;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: var(--bg);
      color: #f0f0f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: background 0.6s ease;
    }

    header {
      width: 100%;
      max-width: 720px;
      padding: 20px 24px 8px;
      text-align: center;
    }

    #eye-display {
      width: 120px;
      height: 60px;
      background: #1a0000;
      border-radius: 12px;
      margin: 0 auto 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      border: 1px solid var(--accent-dim);
      transition: background 0.6s ease, border-color 0.6s ease;
    }

    body.chill #eye-display { background: #00111a; }

    .eye {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--accent);
      transition: all 0.4s ease;
      box-shadow: 0 0 10px var(--accent);
      position: relative;
    }

    body.chill .eye { border-radius: 4px; height: 18px; }
    .eye::after { content:''; position:absolute; width:8px; height:8px; background:rgba(255,255,255,0.3); border-radius:50%; top:4px; left:4px; }

    @keyframes blink { 0%,90%,100%{transform:scaleY(1)} 95%{transform:scaleY(0.05)} }
    @keyframes chill-blink { 0%,92%,100%{transform:scaleY(1)} 96%{transform:scaleY(0.05)} }
    body:not(.chill) .eye { animation: blink 3s infinite; }
    body:not(.chill) .eye:nth-child(2) { animation-delay: 0.1s; }
    body.chill .eye { animation: chill-blink 5s infinite; }
    body.chill .eye:nth-child(2) { animation-delay: 0.12s; }

    header h1 { font-size: 2rem; font-weight: 700; color: var(--accent); letter-spacing: 6px; transition: color 0.6s; }
    header p { font-size: 0.8rem; color: #777; margin-top: 4px; min-height: 18px; }

    #mode-toggle-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin: 10px 0 4px;
    }

    .mode-label {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 2px;
      transition: color 0.4s, opacity 0.4s;
    }

    /* Active label = accent color, inactive = dimmed */
    #label-chaos { color: #ff4d4d; }
    #label-chill { color: #4d9fff; }
    body:not(.chill) #label-chaos { opacity: 1; }
    body:not(.chill) #label-chill { opacity: 0.3; }
    body.chill #label-chaos { opacity: 0.3; }
    body.chill #label-chill { opacity: 1; }

    .toggle-track {
      width: 48px; height: 26px;
      background: #ff4d4d;
      border-radius: 13px;
      position: relative;
      cursor: pointer;
      transition: background 0.4s ease;
    }
    .toggle-track.chill { background: #4d9fff; }
    .toggle-knob {
      width: 20px; height: 20px;
      background: white; border-radius: 50%;
      position: absolute; top: 3px; left: 3px;
      transition: transform 0.4s ease;
    }
    .toggle-track.chill .toggle-knob { transform: translateX(22px); }

    #chat-window {
      flex: 1;
      width: 100%;
      max-width: 720px;
      overflow-y: auto;
      padding: 16px 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message { max-width: 80%; padding: 12px 16px; border-radius: 16px; font-size: 0.95rem; line-height: 1.6; white-space: pre-wrap; }
    .message.user { background: var(--bg3); border: 1px solid var(--border); align-self: flex-end; border-bottom-right-radius: 4px; transition: background 0.6s, border-color 0.6s; }
    .message.bot { background: var(--bg2); border: 1px solid var(--accent-dim); align-self: flex-start; border-bottom-left-radius: 4px; transition: background 0.6s, border-color 0.6s; }
    .message.bot .name { font-size: 0.7rem; color: var(--accent-text); font-weight: 700; letter-spacing: 2px; margin-bottom: 4px; transition: color 0.6s; }
    .message.error { background: #1a0a0a; border: 1px solid #ff4d4d; color: #ff6b6b; align-self: center; text-align: center; font-size: 0.85rem; }

    /* Image preview in chat */
    .message.user img { max-width: 200px; border-radius: 8px; display: block; margin-bottom: 6px; }

    .typing { align-self: flex-start; padding: 12px 16px; background: var(--bg2); border: 1px solid var(--accent-dim); border-radius: 16px; border-bottom-left-radius: 4px; color: var(--accent-text); font-size: 0.85rem; animation: pulse 1.2s infinite; transition: background 0.6s, border-color 0.6s, color 0.6s; }
    @keyframes pulse { 0%,100%{opacity:0.5} 50%{opacity:1} }

    #input-area { width: 100%; max-width: 720px; padding: 8px 24px 24px; display: flex; flex-direction: column; gap: 8px; }

    #input-row { display: flex; gap: 10px; }

    #user-input { flex: 1; background: #1e1e1e; border: 1px solid var(--border); border-radius: 12px; padding: 12px 16px; color: #f0f0f0; font-size: 0.95rem; outline: none; resize: none; height: 48px; transition: border-color 0.3s; }
    #user-input:focus { border-color: var(--accent); }

    button { background: var(--accent); color: white; border: none; border-radius: 12px; padding: 0 20px; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: background 0.4s, opacity 0.2s; }
    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    #reset-btn { background: transparent; border: 1px solid var(--border); color: #666; padding: 0 14px; font-size: 0.8rem; }
    #reset-btn:hover { border-color: var(--accent); color: var(--accent); background: transparent; opacity: 1; }

    /* Camera button row */
    #camera-row { display: flex; align-items: center; gap: 10px; }

    #camera-btn {
      background: transparent;
      border: 1px dashed var(--accent-dim);
      color: var(--accent-text);
      border-radius: 10px;
      padding: 6px 14px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: border-color 0.3s, color 0.3s, background 0.3s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    #camera-btn:hover { border-color: var(--accent); background: var(--accent-dim); opacity: 1; }

    #image-preview {
      display: none;
      align-items: center;
      gap: 8px;
      font-size: 0.8rem;
      color: #888;
    }
    #image-preview img { width: 36px; height: 36px; object-fit: cover; border-radius: 6px; border: 1px solid var(--accent-dim); }
    #clear-img { background: none; border: none; color: #666; font-size: 1rem; cursor: pointer; padding: 0 4px; }
    #clear-img:hover { color: #ff4d4d; opacity: 1; }

    .mode-badge { display:inline-block; font-size:0.6rem; padding:2px 6px; border-radius:4px; background:var(--accent-dim); color:var(--accent-text); letter-spacing:1px; margin-left:6px; vertical-align:middle; transition:background 0.6s,color 0.6s; }

    #file-input { display: none; }
  </style>
</head>
<body id="body">
  <header>
    <div id="eye-display"><div class="eye"></div><div class="eye"></div></div>
    <h1 id="bot-name">C H A O S</h1>
    <div id="mode-toggle-wrap">
      <span class="mode-label" id="label-chaos">CHAOS</span>
      <div class="toggle-track" id="toggle" onclick="switchMode()">
        <div class="toggle-knob"></div>
      </div>
      <span class="mode-label" id="label-chill">CHILL</span>
    </div>
    <p id="subtitle">An AI of questionable stability. Helpful anyway.</p>
  </header>

  <div id="chat-window">
    <div class="message bot">
      <div class="name">CHAOS <span class="mode-badge">CHAOS MODE</span></div>
      Greetings, human! I am CHAOS, your MAGNIFICENTLY unhinged assistant. I was just thinking about last Tuesday — anyway, ask me ANYTHING. Or show me something. I will react to it. Chaotically.
    </div>
  </div>

  <div id="input-area">
    <div id="camera-row">
      <button id="camera-btn" onclick="document.getElementById('file-input').click()">
        📷 show me something
      </button>
      <div id="image-preview">
        <img id="preview-thumb" src="" alt="preview"/>
        <span id="preview-name"></span>
        <button id="clear-img" onclick="clearImage()">✕</button>
      </div>
      <input type="file" id="file-input" accept="image/*" onchange="handleImageSelect(this)"/>
    </div>
    <div id="input-row">
      <textarea id="user-input" placeholder="Ask CHAOS something..." rows="1"></textarea>
      <button id="reset-btn" onclick="resetChat()">Reset</button>
      <button id="send-btn" onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script>
    let currentMode = 'chaos';
    let selectedImageBase64 = null;
    let selectedImageName = '';

    const body = document.getElementById('body');
    const toggle = document.getElementById('toggle');
    const botName = document.getElementById('bot-name');
    const subtitle = document.getElementById('subtitle');
    const chatWindow = document.getElementById('chat-window');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');

    userInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });

    function switchMode() {
      currentMode = currentMode === 'chaos' ? 'chill' : 'chaos';
      const isChill = currentMode === 'chill';
      body.className = isChill ? 'chill' : '';
      toggle.className = 'toggle-track' + (isChill ? ' chill' : '');
      botName.textContent = isChill ? 'C H I L L' : 'C H A O S';
      subtitle.textContent = isChill ? 'An AI of surprising composure.' : 'An AI of questionable stability. Helpful anyway.';

      fetch('/mode', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({mode: currentMode}) });

      const msg = isChill
        ? '...switching to CHILL mode. Conversation reset. How can I help you?'
        : 'CHAOS MODE ACTIVATED. Buckle up. Last Tuesday was a WARNING and nobody listened.';
      addMessage('bot', msg);
    }

    function handleImageSelect(input) {
      const file = input.files[0];
      if (!file) return;
      selectedImageName = file.name;
      const reader = new FileReader();
      reader.onload = (e) => {
        selectedImageBase64 = e.target.result.split(',')[1];
        document.getElementById('preview-thumb').src = e.target.result;
        document.getElementById('preview-name').textContent = file.name.length > 20 ? file.name.slice(0,20)+'...' : file.name;
        document.getElementById('image-preview').style.display = 'flex';
      };
      reader.readAsDataURL(file);
    }

    function clearImage() {
      selectedImageBase64 = null;
      selectedImageName = '';
      document.getElementById('file-input').value = '';
      document.getElementById('image-preview').style.display = 'none';
      document.getElementById('preview-thumb').src = '';
    }

    function addMessage(role, text, imgSrc=null) {
      const div = document.createElement('div');
      div.className = `message ${role}`;
      if (role === 'bot') {
        const modeName = currentMode.toUpperCase();
        div.innerHTML = `<div class="name">${modeName} <span class="mode-badge">${modeName} MODE</span></div>${escapeHtml(text)}`;
      } else if (role === 'user') {
        if (imgSrc) {
          div.innerHTML = `<img src="${imgSrc}" alt="uploaded"/>${escapeHtml(text || 'what do you see?')}`;
        } else {
          div.textContent = text;
        }
      } else if (role === 'error') {
        div.textContent = '⚠ ' + text;
      }
      chatWindow.appendChild(div);
      chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    function escapeHtml(t) {
      return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    async function sendMessage() {
      const msg = userInput.value.trim();
      if (!msg && !selectedImageBase64) return;

      const imgSrc = selectedImageBase64 ? document.getElementById('preview-thumb').src : null;
      userInput.value = '';
      sendBtn.disabled = true;
      addMessage('user', msg || 'what do you see?', imgSrc);

      const typingTexts = { chaos: 'CHAOS is spiraling... please hold...', chill: 'thinking...' };
      const typing = document.createElement('div');
      typing.className = 'typing';
      typing.textContent = typingTexts[currentMode];
      chatWindow.appendChild(typing);
      chatWindow.scrollTop = chatWindow.scrollHeight;

      const payload = { message: msg || 'What do you see in this image? React to it.', mode: currentMode };
      if (selectedImageBase64) payload.image = selectedImageBase64;

      try {
        const res = await fetch('/chat', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) });
        const data = await res.json();
        typing.remove();
        if (data.error) addMessage('error', data.error);
        else addMessage('bot', data.reply);
      } catch(err) {
        typing.remove();
        addMessage('error', 'Could not reach the server. Is Flask running?');
      }

      clearImage();
      sendBtn.disabled = false;
      userInput.focus();
    }

    async function resetChat() {
      await fetch('/reset', { method:'POST' });
      chatWindow.innerHTML = '';
      const msg = currentMode === 'chaos'
        ? "Memory wiped! CHAOS has been reborn. What were we talking about? Actually, it doesn't matter."
        : 'Conversation cleared. Ready when you are.';
      addMessage('bot', msg);
    }
  </script>
</body>
</html>
